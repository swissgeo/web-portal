codecov:
    require_ci_to_pass: false

coverage:
    status:
        project:
            default:
                target: auto
                threshold: 1%
                informational: true
        patch:
            default:
                target: auto
                informational: true

comment:
    layout: 'reach, diff, flags, files'
    behavior: default
    require_changes: false

flag_management:
    default_rules:
        carryforward: true

ignore:
    - '**/dist/**'
    - '**/node_modules/**'
    - '**/*.config.ts'
    - '**/*.config.mts'
    - '**/tests/**'
    - '**/test-utils/**'
    - '**/*.spec.ts'
    - '**/*.test.ts'
    - 'tests/integration/**'
    - 'support/**'
