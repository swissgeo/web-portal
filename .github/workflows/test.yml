name: test

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  push:
    branches:
      - main
      - develop

permissions:
  contents: read
  id-token: write

jobs:
  unit:
    name: unit tests + coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build libraries
        run: pnpm build-libs:dev

      - name: Run unit tests with coverage
        run: pnpm test:coverage

      - name: Render coverage summary
        if: always()
        run: |
          {
            echo "## Coverage summary"
            echo ""
            echo "| Package | Statements | Branches | Functions | Lines |"
            echo "| --- | ---: | ---: | ---: | ---: |"
            for f in packages/*/coverage/coverage-summary.json; do
              pkg=$(echo "$f" | awk -F/ '{print $2}')
              node -e '
                const s = require(`./${process.argv[1]}`).total;
                const pct = m => `${m.pct}% (${m.covered}/${m.total})`;
                process.stdout.write(`| ${process.argv[2]} | ${pct(s.statements)} | ${pct(s.branches)} | ${pct(s.functions)} | ${pct(s.lines)} |\n`);
              ' "$f" "$pkg"
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: false
          flags: unit
          files: ./packages/*/coverage/lcov.info
          use_oidc: true
