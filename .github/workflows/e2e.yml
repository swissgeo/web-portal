name: e2e

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      # Env vars consumed by the Nuxt build and the preview server. Secrets
      # may be empty in non-production environments; populate via GitHub
      # repository/environment secrets when available.
      NUXT_PUBLIC_OGC_API_ENDPOINT: ${{ secrets.NUXT_PUBLIC_OGC_API_ENDPOINT }}
      NUXT_PUBLIC_OVERLAY_ID: ${{ secrets.NUXT_PUBLIC_OVERLAY_ID }}
      NUXT_MAPTILER_API_KEY: ${{ secrets.NUXT_MAPTILER_API_KEY }}
      NUXT_API_ENDPOINT: ${{ secrets.NUXT_API_ENDPOINT }}
      NUXT_AUTH_TOKEN: ${{ secrets.NUXT_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run e2e tests
        run: pnpm test:e2e

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
